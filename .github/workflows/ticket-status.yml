name: Update ticket status

on:
  schedule:
    - cron: '*/15 * * * *'   # every 15 minutes
  workflow_dispatch:           # allow manual trigger from GitHub UI

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Fetch status from Humanitix
        env:
          HUMANITIX_API_KEY: ${{ secrets.HUMANITIX_API_KEY }}
        run: |
          curl -sf \
            -H "x-api-key: $HUMANITIX_API_KEY" \
            "https://api.humanitix.com/v1/events/69731cb92608b884659944da" \
          | jq '{
              markedAsSoldOut: .markedAsSoldOut,
              suspendSales:    .suspendSales,
              ticketTypes: [.ticketTypes[] | {price: .price, disabled: .disabled, deleted: .deleted}]
            }' > ticket-status.json

      - name: Commit if changed
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add ticket-status.json
          git diff --staged --quiet || git commit -m "chore: update ticket status [skip ci]" && git push
